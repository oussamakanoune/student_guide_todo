name: student_guide_todo
description: A modern To-Do List feature for the Student Guide app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  
  connectivity_plus: ^6.0.3
  dio: ^5.4.0

  provider: ^6.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.1.0
  lottie: ^3.1.0
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/